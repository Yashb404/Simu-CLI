name: Hosted Smoke Checks

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Hosted app base URL (example: https://cli-demo-studio.onrender.com)"
        required: false
        type: string
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: hosted-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve base URL
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          input_url="${{ github.event.inputs.base_url || '' }}"
          repo_url="${{ vars.HOSTED_BASE_URL || '' }}"
          event_name="${{ github.event_name }}"

          if [ -n "${input_url}" ]; then
            echo "base_url=${input_url%/}" >> "$GITHUB_OUTPUT"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${repo_url}" ]; then
            echo "base_url=${repo_url%/}" >> "$GITHUB_OUTPUT"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${event_name}" = "schedule" ]; then
            echo "No HOSTED_BASE_URL configured; skipping scheduled smoke checks." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Set HOSTED_BASE_URL as a repository variable or provide workflow_dispatch input.base_url." >&2
          exit 1
      - name: Check API health endpoint
        if: steps.resolve.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 3 \
            "${{ steps.resolve.outputs.base_url }}/api/health"

      - name: Check dashboard root
        if: steps.resolve.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            "${{ steps.resolve.outputs.base_url }}/" > /dev/null

      - name: Check embed bootstrap asset
        if: steps.resolve.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            "${{ steps.resolve.outputs.base_url }}/static/embed.js" > /dev/null
